<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreeSchema To-Do App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6c63ff;
      --secondary: #f5f5f5;
      --danger: #e74c3c;
      --success: #27ae60;
      --text: #2d3436;
      --muted: #636e72;
      --border: #dfe6e9;
      --card-bg: #fff;
      --bg: #f0f2f5;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--primary); color: white; padding: 20px 24px; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 8px rgba(108,99,255,0.3); }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p { font-size: 0.85rem; opacity: 0.85; }
    main { max-width: 820px; margin: 32px auto; padding: 0 16px; }
    .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px; margin-bottom: 24px; }
    .card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; color: var(--primary); }
    .input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.95rem; background: #fafafa; margin-bottom: 12px; font-family: inherit; }
    .input:focus { outline: none; border-color: var(--primary); background: white; }
    .textarea { min-height: 80px; resize: vertical; }
    .btn { padding: 9px 18px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: var(--secondary); color: var(--text); border: 1.5px solid var(--border); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-full { width: 100%; }
    .form-row { display: flex; gap: 12px; }
    .form-row .input { margin-bottom: 0; }
    #login-section { display: block; }
    #app-section { display: none; }
    .login-card { max-width: 420px; margin: 60px auto; }
    .login-card .logo-big { text-align: center; font-size: 3rem; margin-bottom: 8px; }
    .login-card .tagline { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
    #task-list { display: flex; flex-direction: column; gap: 14px; }
    .task-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; border-left: 4px solid var(--border); }
    .status-pending { border-left-color: #f39c12; }
    .status-in-progress { border-left-color: var(--primary); }
    .status-done { border-left-color: var(--success); }
    .task-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
    .task-title { font-size: 1rem; font-weight: 700; }
    .task-desc { color: var(--muted); font-size: 0.9rem; margin-bottom: 6px; }
    .task-date { color: var(--muted); font-size: 0.78rem; margin-bottom: 12px; }
    .task-actions { display: flex; gap: 8px; }
    .badge { font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
    .badge-pending { background: #fef3e2; color: #e67e22; }
    .badge-in-progress { background: #ede9ff; color: var(--primary); }
    .badge-done { background: #e8f8f0; color: var(--success); }
    .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; }
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 22px; border-radius: 10px; font-weight: 600; box-shadow: 0 4px 16px rgba(0,0,0,0.15); transform: translateY(80px); opacity: 0; transition: all 0.3s ease; z-index: 1000; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--success); color: white; }
    .toast.error { background: var(--danger); color: white; }
    .task-edit { display: flex; flex-direction: column; }
    .task-edit .input { margin-bottom: 10px; }
  </style>
</head>
<body>
<header>
  <div>✅</div>
  <div>
    <h1>FreeSchema To-Do App</h1>
    <p>Powered by FreeSchema Data Fabric · Mentor Friends Pvt. Ltd.</p>
  </div>
</header>

<section id="login-section" style="display:none">
  <main>
    <div class="card login-card">
      <div class="logo-big">🔑</div>
      <p class="tagline">Sign in with your develop.freeschema.com account</p>
      <form id="login-form">
        <input id="email" class="input" type="email" placeholder="Email" required />
        <input id="password" class="input" type="password" placeholder="Password" required />
        <button id="login-btn" class="btn btn-primary btn-full" type="submit">Login</button>
      </form>
    </div>
  </main>
</section>

<section id="app-section" style="display:block">
  <main>
    <div class="card">
      <h2>➕ Add New Task</h2>
      <form id="add-task-form">
        <input id="task-title" class="input" type="text" placeholder="Task title *" required />
        <textarea id="task-desc" class="input textarea" placeholder="Description (optional)"></textarea>
        <div class="form-row">
          <select id="task-status" class="input">
            <option value="pending">🕐 Pending</option>
            <option value="in-progress">⚡ In Progress</option>
            <option value="done">✅ Done</option>
          </select>
          <button id="add-btn" class="btn btn-primary" type="submit">+ Add Task</button>
        </div>
      </form>
    </div>
    <div class="card">
      <h2>📋 My Tasks</h2>
      <div id="task-list"><p class="empty-state">Loading tasks…</p></div>
    </div>
  </main>
</section>

<div id="toast" class="toast"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
